<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>バドミントン スタッツ記録</title>
<style>
  :root{
    --bg:#0f1720; --panel:#16212e; --panel2:#1b2735; --line:#243446;
    --txt:#f1f5f9; --muted:#90a4b8; --accent:#ffb300; --ok:#43a047;
    --a:#1e88e5; --a-d:#1565c0; --b:#e53935; --b-d:#c62828;
    --a-bg1:#e3eefb; --a-bg2:#caddf3; --a-ink:#1d4e7e;
    --b-bg1:#fce6e6; --b-bg2:#f6d0d0; --b-ink:#8e2b2b;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%;}
  body{background:var(--bg); color:var(--txt); overflow:hidden; touch-action:manipulation;
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    height:100vh; height:100dvh;}
  .hidden{display:none !important;}
  button{font-family:inherit; cursor:pointer;}

  .screen{height:100vh; height:100dvh; overflow-y:auto; padding:24px 18px 60px; max-width:560px; margin:0 auto;}
  h1{font-size:22px; text-align:center; margin:6px 0 4px;}
  .sub{text-align:center; color:var(--muted); font-size:13px; margin-bottom:20px;}
  .field{margin-bottom:18px;}
  .field>label{display:block; font-size:14px; color:var(--muted); margin-bottom:8px; font-weight:600;}
  input[type=text]{width:100%; padding:12px 14px; border:2px solid var(--line); background:var(--panel2);
    color:var(--txt); border-radius:12px; font-size:16px;}
  input[type=text]:focus{outline:none; border-color:var(--a);}
  .seg{display:flex; gap:8px;}
  .seg button{flex:1; padding:13px 6px; border:2px solid var(--line); background:var(--panel);
    color:var(--txt); border-radius:12px; font-size:15px; font-weight:600;}
  .seg button.on{border-color:var(--accent); background:#23303f; color:var(--accent);}
  .seg button small{display:block; font-weight:400; font-size:11px; color:var(--muted); margin-top:2px;}
  .seg button.on small{color:var(--accent);}
  .teams{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:18px;}
  .teambox{border:2px solid var(--line); border-radius:14px; padding:14px;}
  .teambox.A{border-color:var(--a-d);} .teambox.B{border-color:var(--b-d);}
  .teambox h3{margin:0 0 10px; font-size:15px;} .teambox.A h3{color:#64b5f6;} .teambox.B h3{color:#ef9a9a;}
  .bigbtn{width:100%; padding:18px; border:none; border-radius:14px; font-size:18px; font-weight:700; color:#fff; background:var(--ok);}
  .subbtn{width:100%; padding:15px; border:none; border-radius:12px; font-size:16px; font-weight:700; color:#fff; background:#37485c;}
  .homeChoices{display:flex; flex-direction:column; gap:12px; margin-top:18px;}
  .backbtn{background:none; border:none; color:var(--muted); font-size:13px; padding:4px 0; cursor:pointer; text-decoration:underline; display:block; margin-bottom:6px;}
  .teamline{text-align:center; font-size:12px; color:var(--muted); margin-top:18px;}
  .teamline b{color:var(--txt);}
  .teamline button{background:none; border:none; color:var(--accent); font-size:12px; text-decoration:underline; cursor:pointer;}
  .note{font-size:12px; color:var(--muted); line-height:1.6; margin-top:8px;}

  /* match (scoring) */
  #match{height:100vh; height:100dvh; display:flex; flex-direction:column;}
  #mtop{display:flex; align-items:center; justify-content:space-between; padding:8px 12px;
    padding-top:max(8px,env(safe-area-inset-top)); background:#0b121a; border-bottom:1px solid var(--line); min-height:46px; gap:8px;}
  #minfo{font-size:13px; color:var(--muted); display:flex; align-items:center; gap:10px; flex-wrap:wrap;}
  #minfo b{color:var(--accent); font-size:15px;}
  .gpill{background:#1c2836; padding:3px 9px; border-radius:20px; font-size:12px;}
  #mtop .tb{display:flex; gap:6px;}
  #mtop .tb button{padding:8px 12px; border:1px solid var(--line); background:var(--panel); color:var(--txt); border-radius:9px; font-size:13px; font-weight:600;}
  #undoBtn:disabled{opacity:.35;}
  #court{flex:1; display:flex; position:relative; min-height:0;}
  .side{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; user-select:none; transition:filter .1s;}
  .side.A{background:linear-gradient(160deg,var(--a-bg1),var(--a-bg2)); color:var(--a-ink);}
  .side.B{background:linear-gradient(160deg,var(--b-bg1),var(--b-bg2)); color:var(--b-ink);}
  .side:active{filter:brightness(.96);}
  .side .nm{font-size:clamp(15px,4.5vw,24px); font-weight:700; text-align:center; padding:0 10px; min-height:1.3em;}
  .side .score{font-size:clamp(64px,24vmin,180px); font-weight:800; line-height:.95; font-variant-numeric:tabular-nums;}
  .side .gm{display:flex; gap:7px; margin-top:6px; height:14px;}
  .side .gm i{width:12px; height:12px; border-radius:50%; border:2px solid rgba(0,0,0,.3);}
  .side .gm i.won{background:#ef6c00; border-color:#ef6c00;}
  .tapHint{position:absolute; bottom:max(12px,env(safe-area-inset-bottom)); width:100%; text-align:center; font-size:12px; color:#33506b; pointer-events:none;}
  #setboard{position:absolute; top:36px; left:50%; transform:translateX(-50%); z-index:3; background:#11202e; border-radius:14px; padding:6px 14px; text-align:center; box-shadow:0 4px 14px rgba(0,0,0,.3);}
  #setboard .nums{display:flex; align-items:center; gap:12px;}
  #setboard .sc{font-size:34px; font-weight:800; color:var(--accent); font-variant-numeric:tabular-nums; min-width:26px;}
  #setboard .dash{font-size:22px; color:#56708a;}
  #setboard .lbl{font-size:9px; color:#7e96ac; letter-spacing:3px;}

  /* overlay / picker */
  .ovl{position:absolute; inset:0; background:rgba(6,11,17,.86); z-index:20; display:flex; align-items:center; justify-content:center; padding:18px; backdrop-filter:blur(2px);}
  .pcard{background:var(--panel); border:1px solid var(--line); border-radius:18px; padding:18px 16px; max-width:480px; width:100%; max-height:92vh; overflow-y:auto;}
  .ptitle{font-size:17px; font-weight:700; text-align:center; margin-bottom:14px;}
  .ptitle span{color:var(--accent);}
  .pgrid{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  .plabel{font-size:12px; color:var(--muted); margin-bottom:8px; font-weight:600; text-align:center;}
  .pbtns{display:flex; flex-direction:column; gap:8px;}
  .pbtns button{padding:13px 8px; border:2px solid var(--line); background:var(--panel2); color:var(--txt); border-radius:11px; font-size:15px; font-weight:600;}
  .pcol.win .pbtns button{border-color:#2f6b3f;} .pcol.win .pbtns button:active{background:#1f3a28;}
  .pcol.err .pbtns button{border-color:#7a3b3b;} .pcol.err .pbtns button:active{background:#3a2424;}
  .pskip{width:100%; margin-top:14px; padding:12px; border:1px solid var(--line); background:#26323f; color:var(--muted); border-radius:11px; font-size:14px; font-weight:600;}
  .pcancel{width:100%; margin-top:8px; padding:10px; border:none; background:none; color:var(--muted); font-size:13px; text-decoration:underline;}

  /* summary / detail / history */
  .card{background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:14px 16px; margin-bottom:14px;}
  .scard h3{margin:0 0 10px; font-size:16px;}
  .scard.A h3{color:#64b5f6;} .scard.B h3{color:#ef9a9a;}
  .statrow{display:flex; justify-content:space-between; font-size:14px; padding:5px 0; border-top:1px solid var(--line);}
  .statrow:first-of-type{border-top:none;}
  .statrow .v{font-weight:800; font-variant-numeric:tabular-nums;}
  .bd{margin:6px 0 2px; font-size:12px; color:var(--muted);}
  .chip{display:inline-block; background:#1c2836; border-radius:8px; padding:2px 8px; margin:2px 4px 2px 0; font-size:12px;}
  .chip b{color:var(--accent);}
  .result{text-align:center; font-size:15px; margin:4px 0 14px; color:var(--muted);}
  .result b{color:var(--txt); font-size:18px;}
  .row2{display:flex; gap:10px;}
  .row2 button{flex:1;}

  .hitem{display:flex; align-items:center; gap:8px; background:var(--panel); border:1px solid var(--line); border-radius:11px; padding:4px 6px 4px 13px; margin-bottom:8px;}
  .hitem:hover{border-color:var(--accent);}
  .hinfo{flex:1; min-width:0; cursor:pointer; padding:8px 0;}
  .hinfo .ht{font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .hinfo .hd{font-size:12px; color:var(--muted);}
  .hdel{background:none; border:none; color:#d98b8b; font-size:20px; cursor:pointer; padding:4px 10px; border-radius:8px;}
  .hdel:hover{background:rgba(217,139,139,.15);}
  .empty{color:var(--muted); font-size:14px; text-align:center; padding:30px 10px; border:1px dashed var(--line); border-radius:12px;}
</style>
</head>
<body>

<!-- ===== HOME ===== -->
<div id="home" class="screen">
  <h1>🏸 スタッツ記録</h1>
  <div class="sub">大阪女学院 バドミントン部</div>
  <div class="homeChoices">
    <button id="goNew" class="bigbtn">＋ 新しい試合を記録</button>
    <button id="goHistory" class="subbtn">📊 履歴を見る</button>
  </div>
  <div class="teamline">チーム：<b id="teamName">ojbad</b> <button id="changeTeam">変更</button></div>
  <p class="note">同じ「チームの合言葉」の端末どうしで履歴を共有します。1点ごとに「決まり方」をタップして記録します。</p>
</div>

<!-- ===== SETUP ===== -->
<div id="setup" class="screen hidden">
  <button class="backbtn" id="setupBack">← もどる</button>
  <h1>試合の設定</h1>
  <div class="field">
    <label>ラベル（相手・メモなど）</label>
    <input type="text" id="label" placeholder="例：練習試合 vs ○○高校">
  </div>
  <div class="field">
    <label>得点方式</label>
    <div class="seg" id="segMode">
      <button data-v="15" class="on">15点制<small>新ルール</small></button>
      <button data-v="21">21点制<small>従来</small></button>
    </div>
  </div>
  <div class="field">
    <label>種目</label>
    <div class="seg" id="segType">
      <button data-v="singles" class="on">シングルス</button>
      <button data-v="doubles">ダブルス</button>
    </div>
  </div>
  <div class="teams">
    <div class="teambox A"><h3>● Aサイド</h3><input type="text" id="aName" placeholder="選手/ペア名"></div>
    <div class="teambox B"><h3>● Bサイド</h3><input type="text" id="bName" placeholder="選手/ペア名"></div>
  </div>
  <button id="startBtn" class="bigbtn">記録を開始</button>
</div>

<!-- ===== MATCH (scoring) ===== -->
<div id="match" class="hidden">
  <div id="mtop">
    <div id="minfo">
      <span class="gpill" id="modePill"></span>
      <span>第<b id="gameNo">1</b>ゲーム</span>
      <span id="setScores"></span>
    </div>
    <div class="tb">
      <button id="undoBtn">↩ 戻す</button>
      <button id="endBtn">終了</button>
    </div>
  </div>
  <div id="court">
    <div id="setboard"><div class="nums"><span class="sc" id="gA">0</span><span class="dash">－</span><span class="sc" id="gB">0</span></div><div class="lbl">ゲーム</div></div>
    <div class="side A" id="sideA"><div class="nm" id="nmA"></div><div class="score" id="scoreA">0</div><div class="gm" id="gmA"></div></div>
    <div class="side B" id="sideB"><div class="nm" id="nmB"></div><div class="score" id="scoreB">0</div><div class="gm" id="gmB"></div></div>
    <div class="tapHint">得点した側をタップ → 決まり方を選ぶ</div>
  </div>
</div>

<!-- ===== PICKER overlay ===== -->
<div id="picker" class="ovl hidden">
  <div class="pcard">
    <div class="ptitle">どう決まった？<span id="pwho"></span></div>
    <div class="pgrid">
      <div class="pcol win"><div class="plabel" id="pwinLabel">の決め球</div><div class="pbtns" id="winBtns"></div></div>
      <div class="pcol err"><div class="plabel" id="perrLabel">相手のミス</div><div class="pbtns" id="errBtns"></div></div>
    </div>
    <button id="pSkip" class="pskip">不明・とりあえず加点</button>
    <button id="pCancel" class="pcancel">やめる</button>
  </div>
</div>

<!-- ===== GAME/MATCH banner overlay ===== -->
<div id="banner" class="ovl hidden"><div class="pcard" id="bannerCard"></div></div>

<!-- ===== SUMMARY ===== -->
<div id="summary" class="screen hidden">
  <h1 id="sumTitle">試合サマリー</h1>
  <div class="result" id="sumResult"></div>
  <div id="sumBody"></div>
  <div class="row2" style="margin-top:6px">
    <button id="saveBtn" class="bigbtn">クラウドに保存</button>
  </div>
  <button id="sumHome" class="subbtn" style="margin-top:10px">保存せずホームへ</button>
  <p class="note" id="saveNote"></p>
</div>

<!-- ===== HISTORY ===== -->
<div id="history" class="screen hidden">
  <button class="backbtn" id="histBack">← ホーム</button>
  <h1>記録の履歴</h1>
  <div class="sub">チーム：<b id="teamName2"></b></div>
  <div id="histList"></div>
</div>

<!-- ===== DETAIL ===== -->
<div id="detail" class="screen hidden">
  <button class="backbtn" id="detailBack">← 履歴</button>
  <h1 id="detTitle">試合サマリー</h1>
  <div class="result" id="detResult"></div>
  <div id="detBody"></div>
</div>

<script src="firebase-config.js"></script>
<script src="store.js"></script>
<script>
"use strict";
const $ = id => document.getElementById(id);
const esc = s => String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

/* ---- 決まり方の定義 ---- */
const WIN_SHOTS = [['smash','スマッシュ'],['clear','クリア'],['drop','ドロップ'],['hairpin','ヘアピン'],['drive','ドライブ'],['push','プッシュ'],['other','その他']];
const ERR_TYPES = [['net','ネット'],['out','アウト'],['servefault','サーブミス'],['other','その他ミス']];
const WIN_LABEL = Object.fromEntries(WIN_SHOTS);
const ERR_LABEL = Object.fromEntries(ERR_TYPES);

/* ---- 設定 ---- */
const cfg = { mode:15, type:'singles', label:'', names:['',''] };
function wireSeg(id,key,cast){ $(id).querySelectorAll('button').forEach(b=>b.onclick=()=>{ $(id).querySelectorAll('button').forEach(x=>x.classList.remove('on')); b.classList.add('on'); cfg[key]=cast?cast(b.dataset.v):b.dataset.v; }); }
wireSeg('segMode','mode',Number); wireSeg('segType','type');

/* ---- スコアリング ---- */
let S=null, hist=[];
function targetScore(){ return cfg.mode===15?15:21; }
function cap(){ return cfg.mode===15?21:30; }
function isGameWon(a,b){ if(a>=cap())return true; if(a>=targetScore()&&a-b>=2)return true; return false; }
function snapshot(){ hist.push(JSON.stringify(S)); if(hist.length>300)hist.shift(); }

function startMatch(){
  cfg.label=$('label').value.trim();
  cfg.names=[$('aName').value.trim()||'Aサイド', $('bName').value.trim()||'Bサイド'];
  S={ score:[0,0], gamesWon:[0,0], pastGames:[], gameNo:1, rallies:[], matchOver:false, winner:null, awaitingNext:false };
  hist=[];
  $('modePill').textContent=(cfg.mode===15?'15点制':'21点制')+(cfg.type==='doubles'?'・ダブルス':'・シングルス');
  show('match'); render();
}

let pendingSide=null;   // ピッカー表示中の得点側
function openPicker(side){
  if(S.matchOver||S.awaitingNext) return;
  pendingSide=side;
  $('pwho').textContent = '（'+cfg.names[side]+' の得点）';
  $('pwinLabel').textContent = cfg.names[side]+' の決め球';
  show_overlay('picker');
}
function recordPoint(by,type){
  const side=pendingSide; if(side===null) return;
  snapshot();
  S.rallies.push({ g:S.gameNo, w:side, by, t:type });
  S.score[side]++;
  hideOverlay('picker'); pendingSide=null;
  checkGameOrMatch(); render();
}
function checkGameOrMatch(){
  const [a,b]=S.score; let w=null;
  if(isGameWon(a,b))w=0; else if(isGameWon(b,a))w=1;
  if(w===null) return;
  S.gamesWon[w]++; S.pastGames.push([a,b]);
  if(S.gamesWon[w]===2){ S.matchOver=true; S.winner=w; setTimeout(showSummary,250); return; }
  S.awaitingNext=true; setTimeout(()=>showGameBanner(w),250);
}
function nextGame(w){ S.score=[0,0]; S.gameNo++; S.awaitingNext=false; hideOverlay('banner'); render(); }
function undo(){ if(!hist.length)return; S=JSON.parse(hist.pop()); hideOverlay('picker'); hideOverlay('banner'); pendingSide=null; render(); }

function render(){
  $('scoreA').textContent=S.score[0]; $('scoreB').textContent=S.score[1];
  $('nmA').textContent=cfg.names[0]; $('nmB').textContent=cfg.names[1];
  $('gameNo').textContent=S.gameNo; $('gA').textContent=S.gamesWon[0]; $('gB').textContent=S.gamesWon[1];
  $('setScores').innerHTML = S.pastGames.map(g=>`<span class="gpill">${g[0]}-${g[1]}</span>`).join('');
  $('gmA').innerHTML = [0,1].map(i=>`<i class="${i<S.gamesWon[0]?'won':''}"></i>`).join('');
  $('gmB').innerHTML = [0,1].map(i=>`<i class="${i<S.gamesWon[1]?'won':''}"></i>`).join('');
  $('undoBtn').disabled = hist.length===0;
}

/* ---- overlays ---- */
function show_overlay(id){ $(id).classList.remove('hidden'); }
function hideOverlay(id){ $(id).classList.add('hidden'); }
function showGameBanner(w){
  $('bannerCard').innerHTML = `<div class="ptitle">第${S.gameNo}ゲーム終了</div>
    <div class="result"><b>${esc(cfg.names[w])}</b> がゲーム取得</div>
    <div class="result">${S.pastGames[S.pastGames.length-1][0]} － ${S.pastGames[S.pastGames.length-1][1]}　／　ゲームカウント ${S.gamesWon[0]}-${S.gamesWon[1]}</div>
    <button class="bigbtn" id="nextG">第${S.gameNo+1}ゲームへ</button>`;
  show_overlay('banner');
  $('nextG').onclick=()=>nextGame(w);
}

/* ---- 集計 ---- */
function computeSummary(rallies){
  const blank=()=>({pts:0, lost:0, winners:{}, errors:{}, winTotal:0, errTotal:0, viaWin:0, viaErr:0, viaUnknown:0});
  const st=[blank(),blank()];
  rallies.forEach(r=>{
    const w=r.w, l=1-w;
    st[w].pts++; st[l].lost++;
    if(r.by==='W'){ st[w].winners[r.t]=(st[w].winners[r.t]||0)+1; st[w].winTotal++; st[w].viaWin++; }
    else if(r.by==='E'){ st[l].errors[r.t]=(st[l].errors[r.t]||0)+1; st[l].errTotal++; st[w].viaErr++; }
    else { st[w].viaUnknown++; }
  });
  return st;
}
function chips(map,labels){
  const keys=Object.keys(map);
  if(!keys.length) return '<span style="color:#56708a;font-size:12px">なし</span>';
  return keys.sort((a,b)=>map[b]-map[a]).map(k=>`<span class="chip">${esc(labels[k]||k)} <b>${map[k]}</b></span>`).join('');
}
function summaryHTML(names, st){
  return [0,1].map(i=>`
    <div class="card scard ${i===0?'A':'B'}">
      <h3>${esc(names[i])}</h3>
      <div class="statrow"><span>得点</span><span class="v">${st[i].pts}</span></div>
      <div class="statrow"><span>　└ 自分のウィナー</span><span class="v">${st[i].viaWin}</span></div>
      <div class="statrow"><span>　└ 相手のミス誘発</span><span class="v">${st[i].viaErr}${st[i].viaUnknown?` (＋不明${st[i].viaUnknown})`:''}</span></div>
      <div class="bd">ウィナー球種（計${st[i].winTotal}）</div><div>${chips(st[i].winners,WIN_LABEL)}</div>
      <div class="statrow" style="margin-top:8px"><span>失点（自分のミス＋被ウィナー）</span><span class="v">${st[i].lost}</span></div>
      <div class="bd">自分のミス内訳（計${st[i].errTotal}）</div><div>${chips(st[i].errors,ERR_LABEL)}</div>
    </div>`).join('');
}

/* ---- サマリー画面（試合後） ---- */
let lastRecord=null;
function showSummary(){
  hideOverlay('banner');
  const st=computeSummary(S.rallies);
  lastRecord={
    at:Date.now(), label:cfg.label, type:cfg.type, mode:cfg.mode,
    names:cfg.names.slice(),
    result:{ gamesWon:S.gamesWon.slice(), pastGames:S.pastGames.map(g=>g.slice()), winner:S.winner },
    rallies:S.rallies.map(r=>({g:r.g,w:r.w,by:r.by,t:r.t}))
  };
  $('sumResult').innerHTML = `<b>${esc(cfg.names[S.winner])} の勝ち</b>　ゲームカウント ${S.gamesWon[0]}-${S.gamesWon[1]}　(${S.pastGames.map(g=>g[0]+'-'+g[1]).join(', ')})`;
  $('sumBody').innerHTML = summaryHTML(cfg.names, st);
  $('saveNote').textContent='';
  $('saveBtn').disabled=false; $('saveBtn').textContent='クラウドに保存';
  show('summary');
}
function saveMatch(){
  if(!lastRecord) return;
  $('saveBtn').disabled=true; $('saveBtn').textContent='保存中…';
  StatsStore.whenReady(()=>{
    StatsStore.saveMatch(lastRecord).then(()=>{
      $('saveNote').textContent='✓ 保存しました。';
      $('saveBtn').textContent='保存済み';
    }).catch(e=>{
      console.error(e);
      $('saveBtn').disabled=false; $('saveBtn').textContent='クラウドに保存';
      $('saveNote').textContent='⚠ 保存に失敗（オフライン/設定未済かも）。通信を確認して再度お試しください。';
    });
  });
}

/* ---- 履歴 ---- */
function openHistory(){
  $('teamName2').textContent=StatsStore.team;
  $('histList').innerHTML='<div class="empty">読み込み中…</div>';
  show('history');
  StatsStore.whenReady(()=>{
    StatsStore.subscribe(obj=>{
      const ids=Object.keys(obj||{});
      if(!ids.length){ $('histList').innerHTML='<div class="empty">まだ記録がありません。<br>「新しい試合を記録」から始めてください。</div>'; return; }
      ids.sort((a,b)=>(obj[b].at||0)-(obj[a].at||0));
      $('histList').innerHTML=ids.map(id=>{
        const m=obj[id]; const d=new Date(m.at||0);
        const ds=`${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
        const score=(m.result&&m.result.gamesWon)?`${m.result.gamesWon[0]}-${m.result.gamesWon[1]}`:'';
        const title=`${esc(m.names?m.names[0]:'A')} vs ${esc(m.names?m.names[1]:'B')}`;
        return `<div class="hitem">
          <div class="hinfo" data-id="${id}"><div class="ht">${title} <span style="color:var(--accent)">${score}</span></div>
          <div class="hd">${ds}${m.label?'　'+esc(m.label):''}</div></div>
          <button class="hdel" data-id="${id}" title="削除">×</button></div>`;
      }).join('');
      $('histList').querySelectorAll('.hinfo').forEach(el=>el.onclick=()=>openDetail(obj[el.dataset.id]));
      $('histList').querySelectorAll('.hdel').forEach(el=>el.onclick=()=>{
        if(confirm('この記録を削除しますか？（クラウドから消えます）')) StatsStore.deleteMatch(el.dataset.id);
      });
    });
  });
}
function openDetail(m){
  const st=computeSummary(m.rallies||[]);
  $('detTitle').textContent=`${m.names?m.names[0]:'A'} vs ${m.names?m.names[1]:'B'}`;
  const win=(m.result&&m.result.winner!=null)?m.names[m.result.winner]:'';
  $('detResult').innerHTML=`<b>${esc(win)} の勝ち</b>　ゲームカウント ${m.result?m.result.gamesWon.join('-'):''}　(${m.result?m.result.pastGames.map(g=>g[0]+'-'+g[1]).join(', '):''})`;
  $('detBody').innerHTML=summaryHTML(m.names||['A','B'], st);
  show('detail');
}

/* ---- 画面遷移 ---- */
const SCREENS=['home','setup','match','summary','history','detail'];
function show(id){ SCREENS.forEach(s=>$(s).classList.toggle('hidden', s!==id)); }

/* ---- チーム合言葉 ---- */
function refreshTeam(){ $('teamName').textContent=StatsStore.team; }

/* ---- events ---- */
$('goNew').onclick=()=>{ show('setup'); };
$('goHistory').onclick=openHistory;
$('setupBack').onclick=()=>show('home');
$('startBtn').onclick=startMatch;
$('sideA').onclick=()=>openPicker(0);
$('sideB').onclick=()=>openPicker(1);
$('undoBtn').onclick=undo;
$('endBtn').onclick=()=>{ if(confirm('試合を終了してサマリーへ進みますか？')) { S.matchOver=true; S.winner = S.gamesWon[0]>=S.gamesWon[1]?0:1; showSummary(); } };
$('pCancel').onclick=()=>{ hideOverlay('picker'); pendingSide=null; };
$('pSkip').onclick=()=>recordPoint('U','unknown');
$('saveBtn').onclick=saveMatch;
$('sumHome').onclick=()=>show('home');
$('histBack').onclick=()=>show('home');
$('detailBack').onclick=openHistory;
$('changeTeam').onclick=()=>{ const t=prompt('チームの合言葉（同じ値の端末で履歴を共有）', StatsStore.team); if(t&&t.trim()){ StatsStore.setTeam(t); refreshTeam(); } };

/* 決まり方ボタンを生成 */
$('winBtns').innerHTML=WIN_SHOTS.map(([k,l])=>`<button data-k="${k}">${l}</button>`).join('');
$('errBtns').innerHTML=ERR_TYPES.map(([k,l])=>`<button data-k="${k}">${l}</button>`).join('');
$('winBtns').querySelectorAll('button').forEach(b=>b.onclick=()=>recordPoint('W',b.dataset.k));
$('errBtns').querySelectorAll('button').forEach(b=>b.onclick=()=>recordPoint('E',b.dataset.k));

refreshTeam();
</script>
<script type="module" src="firebase-boot.js"></script>
